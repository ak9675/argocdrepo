apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: ak
  annotations:
    kubernetes.io/change-cause: "image tag updating to caddynline-perl for nginx"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - name: c1
        image: kumar2167/demo-nginx:37ffc1c1bc749663450db8ec62905b48e9bc3c79
